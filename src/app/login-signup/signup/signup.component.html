
<div class="mx-auto form-container text-center py-5">
    <h4 class="text-center my-4 py-3 fw-bold">Register to Web Shop</h4>
    <form>
        <div class="my-3 mx-auto form-group">
            <input type="text" class="form-control" placeholder="First Name">
        </div> 
        <div class="my-3 mx-auto form-group">
            <input type="text" class="form-control" placeholder="Last Name">
        </div> 
        <div class="my-3 mx-auto form-group">
            <input type="email" class="form-control" placeholder="Email address">
        </div> 
        <div class="mb-4 mx-auto form-group">
            <input type="password" class="form-control" placeholder="Password">
        </div>    <div class="mb-4 mx-auto form-group">
            <input type="password" class="form-control" placeholder="Confirm password">
        </div>   
        <div class="container text-center my-4">
            <button class="btn btn-outline-dark">Submit</button>
        </div>
        <p class="signup-option">Already have an account? <a class="link-primary" routerLink="/login" routerLinkActive="active">Log in!</a></p>
    </form>
</div>
